<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';">
    <title>SafeType | Student Edition</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --text: #2d3436;
            --accent: #00b894;
            --error: #ff7675;
            --muted: #b2bec3;
        }
        body {
            font-family: 'Courier New', Courier, monospace; /* Monospaced is best for typing */
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            cursor: pointer; /* Shows user they can click anywhere */
        }
        #container {
            max-width: 800px;
            padding: 20px;
            text-align: left;
        }
        #text-display {
            font-size: 1.8rem;
            line-height: 1.5;
            word-spacing: 5px;
            color: var(--muted);
            position: relative;
        }
        .correct { color: var(--text); }
        .incorrect { color: var(--error); background: rgba(255, 118, 117, 0.2); }
        .current { border-bottom: 3px solid var(--accent); }
        
        #stats {
            margin-top: 50px;
            font-family: sans-serif;
            font-size: 1rem;
            color: var(--muted);
        }
        /* Hidden input that actually works */
        #hidden-input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body onclick="focusInput()">

    <div id="container">
        <input type="text" id="hidden-input" autofocus>
        <div id="text-display">Loading safe text...</div>
        
        <div id="stats">
            WPM: <span id="wpm">0</span> | Accuracy: <span id="acc">100</span>%
            <br><br>
            <small>(Click anywhere and just start typing)</small>
        </div>
    </div>

<script>
    const textDisplay = document.getElementById('text-display');
    const inputField = document.getElementById('hidden-input');
    const wpmDisplay = document.getElementById('wpm');
    const accDisplay = document.getElementById('acc');

    const quote = "Education is the most powerful weapon which you can use to change the world.";
    let startTime = null;
    let errors = 0;

    // 1. Setup the text
    function init() {
        textDisplay.innerHTML = quote.split('').map(char => `<span>${char}</span>`).join('');
        inputField.value = '';
    }

    // 2. Focus the input so typing works
    function focusInput() {
        inputField.focus();
    }

    // 3. Logic for typing
    inputField.addEventListener('input', () => {
        if (!startTime) startTime = new Date();

        const arrayQuote = textDisplay.querySelectorAll('span');
        const arrayValue = inputField.value.split('');
        
        errors = 0;

        arrayQuote.forEach((characterSpan, index) => {
            const character = arrayValue[index];
            
            if (character == null) {
                characterSpan.className = ''; // Not typed yet
            } else if (character === characterSpan.innerText) {
                characterSpan.className = 'correct';
            } else {
                characterSpan.className = 'incorrect';
                errors++;
            }

            // Add cursor underline to current letter
            if (index === arrayValue.length) {
                characterSpan.classList.add('current');
            }
        });

        // Calculate WPM
        const timeInMinutes = (new Date() - startTime) / 60000;
        const wpm = Math.round((arrayValue.length / 5) / timeInMinutes);
        if (wpm > 0 && isFinite(wpm)) wpmDisplay.innerText = wpm;

        // Calculate Accuracy
        const acc = Math.round(((arrayValue.length - errors) / arrayValue.length) * 100);
        if (acc >= 0) accDisplay.innerText = acc;

        // Reset if finished
        if (arrayValue.length >= quote.length) {
            alert(`Great job! Final WPM: ${wpm}`);
            location.reload();
        }
    });

    init();
    focusInput();
</script>
</body>
</html>
