<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Safe Typing Test</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Typing Speed Test</h1>

<div class="settings">

<label>Difficulty</label>

<select id="difficulty">
<option value="beginner">Beginner</option>
<option value="moderate">Moderate</option>
<option value="topper">Topper</option>
</select>

<br><br>

<label>Custom Timer (seconds)</label>
<input type="number" id="timerInput" value="30" min="5" max="600">

<br><br>

<button onclick="startTest()">Start Test</button>

</div>

<div id="textDisplay"></div>

<textarea id="inputBox" placeholder="Start typing here..." disabled></textarea>

<div class="result">

<p>Time Left: <span id="time">0</span></p>
<p>WPM: <span id="wpm">0</span></p>
<p>Accuracy: <span id="accuracy">0</span>%</p>

</div>

<script src="script.js"></script>

</body>
</html>
